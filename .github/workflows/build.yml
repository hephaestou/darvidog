name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libtool libtool-bin autoconf automake pkg-config m4 build-essential ccache git zip unzip python3-dev libffi-dev libssl-dev zlib1g-dev libbz2-dev libsqlite3-dev
          pip install buildozer cython==0.29.37
      - name: Setup Android SDK
        run: |
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/cmdline-tools
          cd $HOME/.buildozer/android/platform/android-sdk/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          mv cmdline-tools latest
          SDKMANAGER=$HOME/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager
          yes | $SDKMANAGER --sdk_root=$HOME/.buildozer/android/platform/android-sdk --licenses
          yes | $SDKMANAGER --sdk_root=$HOME/.buildozer/android/platform/android-sdk "build-tools;34.0.0" "platforms;android-33" "tools"
          mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools/bin
          ln -sf $SDKMANAGER $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
      - name: Build APK
        continue-on-error: true
        env:
          BUILDOZER_WARN_ON_ROOT: '0'
        run: buildozer android debug 2>&1 | tee build.log
      - name: Show build errors
        if: always()
        run: |
          echo "=== ERRORS FOUND ==="
          grep -i "\[ERROR\]" build.log | tail -20 || echo "No ERROR lines found"
          grep -i "error:" build.log | tail -20 || echo "No error lines found"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: darvidog-apk
          path: bin/*.apk
      - name: Upload log if failed
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
