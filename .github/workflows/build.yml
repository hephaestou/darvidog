name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    container: kivy/buildozer
    steps:
      - uses: actions/checkout@v4
      - name: Build APK
        run: |
          buildozer android debug 2>&1 | tee build.log
      - name: Show errors
        if: always()
        run: grep -i "\[ERROR\]" build.log | tail -20 || echo "No errors found"
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: darvidog-apk
          path: bin/*.apk
      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
